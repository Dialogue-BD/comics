      overflow: hidden;
      background-color: #000000;
      display: flex;
      justify-content: center;
      align-items: center;
      touch-action: none; /* Disable default browser double-tap/pinch zoom */
    }
    #comic-img {
      max-width: 100vw;
      max-height: 100vh;
      width: auto;
      height: auto;
      object-fit: contain;
      transition: transform 0.05s linear; /* Smooth micro-animation for zooming */
      transform-origin: center center;

<body>
  <img id="comic-img" src="" alt="Comic Page">

  <script>
    // List of images
    var images = ["ChatGPT Image Jun 22, 2026, 01_49_22 AM.jpg", "ChatGPT Image Jun 22, 2026, 10_53_28 AM (2).jpg", "ChatGPT Image Jun 22, 2026, 10_53_28 AM (3).jpg", "ChatGPT Image Jun 22, 2026, 10_53_29 AM (4).jpg", "ChatGPT Image Jun 22, 2026, 10_53_31 AM (5).jpg", "ChatGPT Image Jun 22, 2026, 10_53_32 AM (6).jpg", "ChatGPT Image Jun 22, 2026, 10_53_33 AM (7).jpg", "ChatGPT Image Jun 22, 2026, 10_53_33 AM (8).jpg", "ChatGPT Image Jun 22, 2026, 10_53_34 AM (9).jpg", "ChatGPT Image Jun 22, 2026, 10_54_26 AM.jpg", "ChatGPT Image Jun 22, 2026, 10_54_36 AM (1).jpg", "ChatGPT Image Jun 22, 2026, 10_54_36 AM (2).jpg", "ChatGPT Image Jun 22, 2026, 10_54_37 AM (3).jpg", "ChatGPT Image Jun 22, 2026, 10_54_37 AM (4).jpg", "ChatGPT Image Jun 22, 2026, 10_54_38 AM (5).jpg", "ChatGPT Image Jun 22, 2026, 10_54_39 AM (6).jpg", "ChatGPT Image Jun 22, 2026, 10_54_41 AM (8).jpg", "ChatGPT Image Jun 22, 2026, 10_54_44 AM (9).jpg", "ChatGPT Image Jun 22, 2026, 10_54_46 AM (10).jpg", "ChatGPT Image Jun 22, 2026, 10_54_57 AM (1).jpg", "ChatGPT Image Jun 22, 2026, 10_54_57 AM (2).jpg", "ChatGPT Image Jun 22, 2026, 10_54_58 AM (10).jpg", "ChatGPT Image Jun 22, 2026, 10_54_58 AM (3).jpg", "ChatGPT Image Jun 22, 2026, 10_54_58 AM (4).jpg", "ChatGPT Image Jun 22, 2026, 10_54_58 AM (6).jpg", "ChatGPT Image Jun 22, 2026, 10_54_58 AM (7).jpg", "ChatGPT Image Jun 22, 2026, 10_54_58 AM (8).jpg", "ChatGPT Image Jun 22, 2026, 10_54_58 AM (9).jpg", "ChatGPT Image Jun 22, 2026, 10_55_18 AM.jpg", "ChatGPT Image Jun 22, 2026, 11_00_01 AM (1).jpg", "ChatGPT Image Jun 22, 2026, 11_00_01 AM (2).jpg", "ChatGPT Image Jun 22, 2026, 11_00_02 AM (3).jpg", "ChatGPT Image Jun 22, 2026, 11_00_03 AM (5).jpg", "ChatGPT Image Jun 22, 2026, 11_00_04 AM (6).jpg", "ChatGPT Image Jun 22, 2026, 11_00_04 AM (7).jpg", "ChatGPT Image Jun 22, 2026, 11_00_05 AM (8).jpg", "ChatGPT Image Jun 22, 2026, 11_00_05 AM (9).jpg", "ChatGPT Image Jun 22, 2026, 11_00_06 AM (10).jpg", "ChatGPT Image Jun 22, 2026, 11_07_17 AM (1).jpg", "ChatGPT Image Jun 22, 2026, 11_07_17 AM (2).jpg", "ChatGPT Image Jun 22, 2026, 11_07_18 AM (4).jpg", "ChatGPT Image Jun 22, 2026, 11_07_18 AM (5).jpg", "ChatGPT Image Jun 22, 2026, 11_07_18 AM (6).jpg", "ChatGPT Image Jun 22, 2026, 11_07_18 AM (7).jpg", "ChatGPT Image Jun 22, 2026, 11_07_18 AM (8).jpg", "ChatGPT Image Jun 22, 2026, 11_07_19 AM (10).jpg", "ChatGPT Image Jun 22, 2026, 11_07_19 AM (9).jpg", "ChatGPT Image Jun 22, 2026, 12_36_51 PM (1).jpg", "ChatGPT Image Jun 22, 2026, 12_36_51 PM (2).jpg", "ChatGPT Image Jun 22, 2026, 12_36_52 PM (3).jpg", "ChatGPT Image Jun 22, 2026, 12_36_52 PM (4).jpg", "ChatGPT Image Jun 22, 2026, 12_36_53 PM (5).jpg", "ChatGPT Image Jun 22, 2026, 12_36_53 PM (6).jpg", "ChatGPT Image Jun 22, 2026, 12_36_53 PM (7).jpg", "ChatGPT Image Jun 22, 2026, 12_36_54 PM (8).jpg", "ChatGPT Image Jun 22, 2026, 12_36_54 PM (9).jpg", "ChatGPT Image Jun 22, 2026, 12_36_55 PM (10).jpg", "ChatGPT Image May 3, 2026, 03_25_09 PM.jpg", "ChatGPT Image May 3, 2026, 03_25_17 PM.jpg", "ChatGPT Image May 3, 2026, 03_25_27 PM.jpg", "ChatGPT Image May 3, 2026, 03_25_37 PM.jpg", "ChatGPT Image May 3, 2026, 03_25_46 PM.jpg", "ChatGPT Image May 3, 2026, 03_25_58 PM.jpg", "ChatGPT Image May 3, 2026, 03_26_12 PM.jpg", "ChatGPT Image May 3, 2026, 03_26_44 PM.jpg", "ChatGPT Image May 3, 2026, 03_28_02 PM.jpg", "ChatGPT Image May 3, 2026, 03_28_48 PM.jpg", "ChatGPT Image May 3, 2026, 03_29_28 PM.jpg", "ChatGPT Image May 3, 2026, 03_29_52 PM.jpg", "ChatGPT Image May 3, 2026, 03_30_31 PM.jpg", "ChatGPT Image May 3, 2026, 03_30_46 PM.jpg", "ChatGPT Image May 3, 2026, 03_31_01 PM.jpg", "ChatGPT Image May 3, 2026, 03_31_10 PM.jpg", "ChatGPT Image May 3, 2026, 03_31_18 PM.jpg", "ChatGPT Image May 3, 2026, 03_31_25 PM.jpg", "ChatGPT Image May 3, 2026, 03_32_14 PM.jpg", "ChatGPT Image May 3, 2026, 03_33_23 PM.jpg", "ChatGPT Image May 3, 2026, 03_33_37 PM.jpg", "ChatGPT Image May 3, 2026, 03_33_50 PM.jpg", "ChatGPT Image May 3, 2026, 03_34_21 PM.jpg", "ChatGPT Image May 3, 2026, 03_34_28 PM.jpg", "ChatGPT Image May 3, 2026, 03_34_42 PM.jpg", "ChatGPT Image May 3, 2026, 03_34_51 PM.jpg", "ChatGPT Image May 3, 2026, 03_35_05 PM.jpg", "ChatGPT Image May 3, 2026, 03_35_35 PM.jpg", "ChatGPT Image May 3, 2026, 03_35_53 PM.jpg", "ChatGPT Image May 3, 2026, 03_36_01 PM.jpg", "ChatGPT Image May 3, 2026, 03_36_31 PM.jpg", "ChatGPT Image May 3, 2026, 03_37_40 PM.jpg", "ChatGPT Image May 3, 2026, 03_37_54 PM.jpg", "ChatGPT Image May 3, 2026, 03_38_25 PM.jpg", "ChatGPT Image May 3, 2026, 03_39_45 PM.jpg", "ChatGPT Image May 3, 2026, 03_40_28 PM.jpg", "ChatGPT Image May 3, 2026, 03_40_51 PM.jpg", "assembling_bookshelf.jpg", "grocery_shopping.jpg", "move_in_inspection.jpg", "taking_the_bus.jpg", "vacuuming_floors.jpg", "washing_dishes.jpg"];

    // Select a random image
    var randomImage = images[Math.floor(Math.random() * images.length)];
    var img = document.getElementById("comic-img");
    img.src = randomImage;

    // PINCH TO ZOOM & PAN LOGIC (纯JS实现，在全屏模式下依然完美缩放与拖拽)
    var scale = 1;
    var initDist = 0;
    var startX = 0, startY = 0;
    var posX = 0, posY = 0;
    var activeTouch = false;
    
    // Tap-to-fullscreen detection
    var touchStartTime = 0;
    var startTouchX = 0, startTouchY = 0;
    var isGesture = false;

    function getDistance(t1, t2) {
      return Math.sqrt(Math.pow(t1.clientX - t2.clientX, 2) + Math.pow(t1.clientY - t2.clientY, 2));
    }

    document.body.addEventListener("touchstart", function(e) {
      if (e.touches.length === 2) {
        initDist = getDistance(e.touches[0], e.touches[1]);
        activeTouch = true;
        isGesture = true;
      } else if (e.touches.length === 1) {
        // Record tap start
        touchStartTime = Date.now();
        startTouchX = e.touches[0].clientX;
        startTouchY = e.touches[0].clientY;
        
        startX = e.touches[0].clientX - posX;
        startY = e.touches[0].clientY - posY;
        activeTouch = true;
        isGesture = false;
      }
    });

    document.body.addEventListener("touchmove", function(e) {
      if (!activeTouch) return;
      
      // Determine if it is a drag/gesture
      if (e.touches.length === 1) {
        var dx = e.touches[0].clientX - startTouchX;
        var dy = e.touches[0].clientY - startTouchY;
        if (Math.abs(dx) > 10 || Math.abs(dy) > 10) {
          isGesture = true;
        }
      }

      if (e.touches.length === 2 && initDist > 0) {
        e.preventDefault();
        var dist = getDistance(e.touches[0], e.touches[1]);
        var factor = dist / initDist;
        var newScale = scale * factor;
        
        // Bounded zoom between 1x and 4x
        if (newScale < 1) newScale = 1;
        if (newScale > 4) newScale = 4;
        
        img.style.transform = "scale(" + newScale + ") translate(" + (posX / newScale) + "px, " + (posY / newScale) + "px)";
      } else if (e.touches.length === 1 && scale > 1) {
        e.preventDefault();
        posX = e.touches[0].clientX - startX;
        posY = e.touches[0].clientY - startY;
        
        // Bound panning boundaries
        var maxPanX = (scale - 1) * window.innerWidth / 2;
        var maxPanY = (scale - 1) * window.innerHeight / 2;
        if (posX > maxPanX) posX = maxPanX;
        if (posX < -maxPanX) posX = -maxPanX;
        if (posY > maxPanY) posY = maxPanY;
        if (posY < -maxPanY) posY = -maxPanY;
        
        img.style.transform = "scale(" + scale + ") translate(" + (posX / scale) + "px, " + (posY / scale) + "px)";
      }
    });

    document.body.addEventListener("touchend", function(e) {
      if (e.touches.length < 2) {
        if (e.touches.length === 0) {
          activeTouch = false;
          
          // Tap check: if no gesture and short duration, toggle fullscreen
          if (!isGesture && (Date.now() - touchStartTime < 250)) {
            toggleFullscreen();
          }
        }
        
        // Extract scale from transform matrix to keep state
        var transform = img.style.transform;
        var match = transform.match(/scale\(([^)]+)\)/);
        if (match) {
          scale = parseFloat(match[1]);
        }
        initDist = 0;
      }
    });

    function toggleFullscreen() {
      var isFullscreen = document.fullscreenElement || 
                         document.mozFullScreenElement || 
                         document.webkitFullscreenElement || 
                         document.msFullscreenElement;
                         
      if (isFullscreen) {
        if (document.exitFullscreen) {
          document.exitFullscreen();
        } else if (document.mozCancelFullScreen) {
          document.mozCancelFullScreen();
        } else if (document.webkitExitFullscreen) {
          document.webkitExitFullscreen();
        } else if (document.msExitFullscreen) {
          document.msExitFullscreen();
        }
      } else {
        var docElm = document.documentElement;
        if (docElm.requestFullscreen) {
          docElm.requestFullscreen();
        } else if (docElm.mozRequestFullScreen) {
          docElm.mozRequestFullScreen();
        } else if (docElm.webkitRequestFullscreen) {
          docElm.webkitRequestFullscreen();
        } else if (docElm.msRequestFullscreen) {
          docElm.msRequestFullscreen();
        }
      }
    }
  </script>
</body>
