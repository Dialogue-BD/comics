<!DOCTYPE html>
<html>
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
  <title>Action Narrative</title>
  <meta name="apple-mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
  <style>
    body {
      margin: 0;
      padding: 0;
      background-color: #000000;
      display: flex;
      justify-content: center;
      align-items: center;
      width: 100vw;
      height: 100vh;
      overflow: hidden;
      cursor: pointer;
    }
    img {
      max-width: 100vw;
      max-height: 100vh;
      width: auto;
      height: auto;
      object-fit: contain;
    }
  </style>
</head>
<body>
  <img id="comic-img" src="" alt="Narrative Page">

  <script>
    // List of all compressed narrative images
    var images = ["ChatGPT Image Jun 22, 2026, 12_36_51 PM (1).jpg", "ChatGPT Image Jun 22, 2026, 12_36_51 PM (2).jpg", "ChatGPT Image Jun 22, 2026, 12_36_52 PM (3).jpg", "ChatGPT Image Jun 22, 2026, 12_36_52 PM (4).jpg", "ChatGPT Image Jun 22, 2026, 12_36_53 PM (5).jpg", "ChatGPT Image Jun 22, 2026, 12_36_53 PM (6).jpg", "ChatGPT Image Jun 22, 2026, 12_36_53 PM (7).jpg", "ChatGPT Image Jun 22, 2026, 12_36_54 PM (8).jpg", "ChatGPT Image Jun 22, 2026, 12_36_54 PM (9).jpg", "ChatGPT Image Jun 22, 2026, 12_36_55 PM (10).jpg"];

    // Select a random image
    var randomImage = images[Math.floor(Math.random() * images.length)];
    document.getElementById("comic-img").src = randomImage;

    // Request or exit full screen toggled by tapping anywhere on the screen
    document.body.addEventListener("click", function() {
      var isFullscreen = document.fullscreenElement || 
                         document.mozFullScreenElement || 
                         document.webkitFullscreenElement || 
                         document.msFullScreenElement;
                         
      if (isFullscreen) {
        if (document.exitFullscreen) {
          document.exitFullscreen();
        } else if (document.mozCancelFullScreen) {
          document.mozCancelFullScreen();
        } else if (document.webkitExitFullscreen) {
          document.webkitExitFullscreen();
        } else if (document.msExitFullscreen) {
          document.msExitFullscreen();
        }
      } else {
        var docElm = document.documentElement;
        if (docElm.requestFullscreen) {
          docElm.requestFullscreen();
        } else if (docElm.mozRequestFullScreen) {
          docElm.mozRequestFullScreen();
        } else if (docElm.webkitRequestFullscreen) {
          docElm.webkitRequestFullscreen();
        } else if (docElm.msRequestFullscreen) {
          docElm.msRequestFullscreen();
        }
      }
    });
  </script>
</body>
</html>
